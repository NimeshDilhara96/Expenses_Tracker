<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Expense</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans antialiased">
  <main class="app-shell dashboard-shell mx-auto grid min-h-dvh max-w-xl place-items-center px-4 py-6">
    <div class="w-full">
      <header class="mb-12 text-center">
        <a class="app-logo mx-auto inline-flex mb-8" href="./index.html" aria-label="Go to dashboard home">
          <span class="app-logo-mark" aria-hidden="true">
            <img src="./logo-mark.svg" alt="" class="app-logo-icon">
          </span>
          <span class="app-logo-meta">
            <span class="app-logo-name">Expense Tracker</span>
            <span class="app-logo-tag">Smart Finance</span>
          </span>
        </a>
        <h1 class="text-3xl font-serif">Add Expense</h1>
        <p class="mt-2 text-slate-500">Choose how you want to add your expense</p>
      </header>

      <div class="grid gap-6">
        <!-- Scan Card -->
        <button id="start-scan-btn" class="group relative overflow-hidden rounded-3xl border border-slate-200 bg-white p-8 text-left transition-all hover:border-blue-400 hover:shadow-xl active:scale-95">
          <div class="relative z-10">
            <div class="mb-4 inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-blue-50 text-blue-600 transition-colors group-hover:bg-blue-600 group-hover:text-white">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
            </div>
            <h2 class="text-xl font-bold">Scan Receipt</h2>
            <p class="mt-1 text-sm text-slate-500">Use camera to extract amount automatically</p>
          </div>
          <div class="absolute -right-4 -top-4 h-24 w-24 rounded-full bg-blue-50/50 blur-3xl transition-colors group-hover:bg-blue-100/50"></div>
        </button>

        <!-- Manual Card -->
        <a href="./expense.html?quick=add-expense#expense-form-card" class="group relative overflow-hidden rounded-3xl border border-slate-200 bg-white p-8 text-left transition-all hover:border-slate-400 hover:shadow-xl active:scale-95">
          <div class="relative z-10">
            <div class="mb-4 inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-slate-50 text-slate-600 transition-colors group-hover:bg-slate-800 group-hover:text-white">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </div>
            <h2 class="text-xl font-bold">Manual Entry</h2>
            <p class="mt-1 text-sm text-slate-500">Type in details yourself</p>
          </div>
          <div class="absolute -right-4 -top-4 h-24 w-24 rounded-full bg-slate-50/50 blur-3xl transition-colors group-hover:bg-slate-100/50"></div>
        </a>
      </div>

      <div class="mt-12 text-center">
        <a href="./index.html" class="text-sm font-medium text-slate-400 hover:text-slate-600">Cancel and go back</a>
      </div>
    </div>
  </main>

  <!-- Scanner Overlay -->
  <div id="scanner-overlay" class="fixed inset-0 z-50 hidden bg-black">
    <video id="scanner-video" class="h-full w-full object-cover" autoplay playsinline></video>
    
    <!-- Scanning UI Overlays -->
    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
      <div class="relative h-64 w-64 border-2 border-white/50 rounded-3xl">
        <div class="absolute inset-0 scanner-anim"></div>
        <!-- Corner brackets -->
        <div class="absolute -top-1 -left-1 h-8 w-8 border-t-4 border-l-4 border-blue-500 rounded-tl-xl"></div>
        <div class="absolute -top-1 -right-1 h-8 w-8 border-t-4 border-r-4 border-blue-500 rounded-tr-xl"></div>
        <div class="absolute -bottom-1 -left-1 h-8 w-8 border-b-4 border-l-4 border-blue-500 rounded-bl-xl"></div>
        <div class="absolute -bottom-1 -right-1 h-8 w-8 border-b-4 border-r-4 border-blue-500 rounded-br-xl"></div>
      </div>
      <p class="mt-8 text-white font-medium text-center px-6">Align receipt within the frame</p>
    </div>

    <!-- Controls -->
    <div class="absolute bottom-12 left-0 right-0 flex justify-center gap-8 px-6">
      <button id="cancel-scan" class="h-14 w-14 flex items-center justify-center rounded-full bg-white/10 text-white backdrop-blur-md pointer-events-auto">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <button id="capture-btn" class="h-16 w-16 flex items-center justify-center rounded-full bg-white text-black shadow-2xl transition-transform active:scale-90 pointer-events-auto">
        <div class="h-12 w-12 rounded-full border-2 border-black/10"></div>
      </button>
    </div>
  </div>

  <!-- Processing Modal -->
  <div id="processing-modal" class="fixed inset-0 z-[60] hidden items-center justify-center bg-slate-900/40 backdrop-blur-sm">
    <div class="w-full max-w-xs rounded-3xl bg-white p-8 text-center shadow-2xl">
      <div class="mb-4 flex justify-center">
        <div class="h-12 w-12 animate-spin rounded-full border-4 border-blue-100 border-t-blue-600"></div>
      </div>
      <h3 class="text-xl font-bold">Analyzing Receipt</h3>
      <p id="processing-status" class="mt-2 text-sm text-slate-500">Extracting details...</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script type="module" src="./js/scanner.js"></script>
</body>
</html>
